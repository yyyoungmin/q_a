<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q&A</title>

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
		padding: 0;
      display: flex;
      flex-direction: column;
     align-items: center;
  justify-content: center; /* 🔥 이걸로 변경 */
		
min-height: 100vh;
  margin-top: -100px;
    }

    h1 {
      font-size: 22px;
      text-align: center;
		margin-top:0;
    }

    textarea, button {
      width: 90%;
      max-width: 500px;
      box-sizing: border-box;
      border-radius: 10px;
    }

    textarea {
      height: 180px;
      padding: 14px;
      font-size: 16px;
      background: #fff9c4;
      border: none;
      outline: none;
    }

    button {
      margin-top: 12px;
      padding: 14px;
      font-size: 16px;
      background: #069ad4;
      color: white;
      border: none;
      cursor: pointer;
		max-width: 100px;
    }

    #msg {
      margin-top: 10px;
    }
	  .highlight{
 	 color: #069ad4;
}
	 
  </style>
</head>

<body>
	<p><span class="highlight">Q&A</span></p>
  <h1><span class="highlight">영민</span>에게 궁금한 것을 물어보세요</h1>

  <textarea id="question" placeholder="질문을 입력하세요.(질문은 익명으로 구글 스프레드시트에 저장됩니다.)"></textarea>
  <button onclick="send()">전송</button>

  <div id="msg"></div>

  <script>
    function send() {
      const question = document.getElementById("question").value.trim();

      if (!question) {
        document.getElementById("msg").innerText = "질문을 입력해주세요! ";
        return;
      }

      document.getElementById("msg").innerText = "전송 중...";

      fetch("https://script.google.com/macros/s/AKfycbyL5kbF2plGID8A10ZeUhIG7-gyCGNjychw7bBcWfzMujrmUfTXZuVPo633mWhAW1IM_A/exec", {
        method: "POST",
        body: JSON.stringify({ question: question }),
      })
      .then(res => res.json())
      .then(() => {
        document.getElementById("msg").innerText = "전송되었습니다!";
        document.getElementById("question").value = "";
      })
      .catch(() => {
        document.getElementById("msg").innerText = "오류 발생 😢";
      });
    }
  </script>
</body>
</html>
